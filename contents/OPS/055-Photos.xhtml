<title>Photos</title>

<section>
<figure class="cover" id="plates">
<img alt="An image of Meghan in a red dress delivering a speech at One Young World Manchester. The accompanying text states: Inviting Meghan to speak at the One Young World Summit in Manchester, England, in September 2022 the organisers knew was a risk. To their dismay, Meghan used the event to relaunch herself rather than promote their organisation." src="images/plate1-1.jpg" style="height:98vh;width:auto;"/>
</figure>
<figure class="cover">
<img alt="At the top of the page, An image of Oprah Winfrey, waving to the camera as she arrives at the wedding of Harry and Meghan. The accompanying text reads: ‘Although not a friend of the Sussexes, Oprah Winfrey’s invitation to their wedding in 2018 signalled to many Meghan’s plan to forge relations with America’s royalty.’ At the bottom of the page, An image of Harry and Meghan smiling at one another under an umbrella they are sharing as they walk down a street. The accompanying text reads: ‘Harry and Meghan expertly exploited their final official appearance in Britain at the Mansion House on 5th March, 2020 to win global sympathy.’" src="images/plate1-2.jpg" style="height:98vh;width:auto;"/>
</figure>
<figure class="cover">
<img alt="In the top half of the page, an image of Harry at the Duke of Edinburgh’s funeral, with a serious expression. In front of him, on the left is Andrew Mountbatten-Windsor and on the right is Prince Edward. The accompanying text reads: ‘Ordered not to wear military uniform, Harry walked alongside his disgraced uncle Andrew similarly told to wear a morning suit for the Duke of Edinburgh’s funeral in April 2021. Prince Edward suffered in silence.’ In the bottom half, an Harry and Meghan at the Jubilee celebration for Queen Elizabeth II in 2022. Meghan is smiling, while Harry wears a serious expression. The accompanying text reads: Harry and Meghan were deliberately isolated during the service of thanksgiving for the reign of Queen Elizabeth II at St Paul’s Cathedral in London on 3rd June 2022. Following their incendiary interview with Oprah Winfrey, they were surprisingly angered at their treatment by senior royals during the four days of celebrations to mark the Platinum Jubilee." src="images/plate1-3.jpg" style="height:98vh;width:auto;"/>
</figure>
<figure class="cover">
<img alt="At the top of the page an image of Prince William, Princess Catherine, Harry and Meghan waving to surrounding crowds. The text reads: Forced smiles concealed the deep antagonism felt by William and Kate towards the Sussexes during a last-minute appearance on 10th September 2022 to meet well-wishers outside Windsor Castle after the Queen’s death. At the bottom of the page, an image of Harry and Meghan looking forwards seriously. The text reads: While paying their respects to the Queen’s memory in Westminster Hall on 14th September 2022, Harry and Meghan knew that their forthcoming Netflix series and Harry’s autobiography would betray any suggestion of loyalty." src="images/plate1-4.jpg" style="height:98vh;width:auto;"/>
</figure>
<figure class="cover">
<img alt="At the top of the page, an image of Willliam and Harry at the Queen’s funeral, William in his military dress and Harry in his morning suit. William is in the background and out of focus, Harry in the foreground looking down sadly. The caption reads: Long hoped by some as an opportunity for reconciliation between the two brothers as they walked together behind the State Hearse carrying the coffin of Queen Elizabeth II towards St George’s Chapel on 19th September 2022, the event firmly sealed their irrevocable division. At the bottom, an image of a woman watching Harry and Meghan’s Netflix show on her television. The caption reads: Britain and the Royal Family were blindsided by Harry and Meghan’s eponymous Netflix series, released in December 2022, just weeks after the Queen’s funeral. Harry knew that his memoir, published shortly after, would further devastate his family relationships." src="images/plate1-5.jpg" style="height:98vh;width:auto;"/>
</figure>
<figure class="cover">
<img alt="At the top of the page, a picture of Harry’s book, Spare, on display in a bookshop. The caption reads: The publication of Harry’s autobiography Spare marked a watershed moment, creating a rift with his family that felt irreparable. At the bottom, a picture of Harry at King Charles III’s coronation, with bishops in robes, waving. The caption reads: Less than one hour after forcing a smile outside Westminster Abbey on 6th May 2023 – having witnessed the coronation of King Charles III – Harry was at Heathrow to fly back to America." src="images/plate1-6.jpg" style="height:98vh;width:auto;"/>
</figure>
<figure class="cover">
<img alt="At the top of the page, an image of Harry with David Sherborne, smiling as they leave court. The accompanying text reads: Harry’s trust in his barrister, David Sherborne, to wreak vengeance against Britain’s newspapers for phone hacking was vindicated after he left a central London courthouse in 2023 having testified against Mirror Group Newspapers. At the bottom of the page, three images, one of Edward Young, one of Simon Case and one of Clive Alderton. The caption reads: Harry’s contempt for senior Palace officials – Edward Young, Simon Case and Clive Alderton – was characterised by his portrayal of the trio as The Bee, The Fly and The Wasp." src="images/plate1-7.jpg" style="height:98vh;width:auto;"/>
</figure>
<figure class="cover">
<img alt="At the top of the page, an image of Jill Biden and Harry sat together at the Invictus games, smiling. The caption reads: Grateful for Jill Biden’s support of his Invictus Games, and her presence with the vice president in Toronto, Canada, on 30th September 2017 for the wheelchair basketball final, the Sussexes endorsed the Biden presidency and financially supported their daughter’s charity. At the bottom of the page, an image of Harry and Meghan speaking to athletes from the Invictus /games, while being filmed by a camera crew. The caption reads: Seizing on the 2020 Invictus Games in The Hague as a venue to promote herself, Meghan, accompanied by a film crew, enthusiastically mixed with the athletes while her website promoted the clothes and accessories she wore." src="images/plate1-8.jpg" style="height:98vh;width:auto;"/>
</figure>
<figure class="cover">
<img alt="At the top of the page, an image of Prince Harry stood on a black carpet, smiling as he holds a hockey puck between two ice hockey players. The caption reads: Dropping the puck during a ceremonial face-off at the NHL hockey game in Vancouver in November 2023 to highlight the Invictus Games two years later, Harry grasped every opportunity to promote the charity facing existential challenges. At the bottom of the page, an image of Harry and Meghan kissing in a crowd of Invictus games spectators. The caption reads: Aware that dozens of media cameras were focused on her, Meghan theatrically jumped up to surprise Harry with a kiss during the opening ceremony of the Invictus Games in Vancouver in February 2025." src="images/plate2-1.jpg" style="height:98vh;width:auto;"/>
</figure>
<figure class="cover">
<img alt="At the top of the page, an image of William and Kate with two women, they are all smiling and stood round a podium, pushing a button. The caption reads: Prince William’s launch of his Earthshot Prize in Boston in November 2022 was mired by controversy. Not only was the Royal Family besieged in London by new allegations of ‘racism’ but, despite the presence of President Biden and Ambassador Kennedy, the Sussexes were planning a rival event in New York to launch their Netflix series. At the bottom of the page, an image of Harry and Meghan sat in chairs at the Rober F. Kennedy Human Rights Gala; Harry is speaking into a microphone while Meghan looks at him and laughs. The caption reads: Awarded the Robert F. Kennedy Human Rights Ripple of Hope at a glittering gala in New York, Meghan’s denunciation of the ‘racist’ royal family stunned the world but won warm applause from her prestigious audience." src="images/plate2-2.jpg" style="height:98vh;width:auto;"/>
</figure>
<figure class="cover">
<img alt="At the top of the page, an image of Princess Catherine stood under a tree, looking upwards and smiling. The caption reads: Marking her return to public life after treatment for cancer, the Princess of Wales posed next to a tree in Windsor on 14th June 2024, not least to dispel the malicious rumours about herself. At the bottom of the page, an image of King Charles and Queen Camilla walking out of a building, smiling. The caption reads: King Charles and the Queen at The London Clinic in June 2024 after he received treatment for an enlarged prostate, which later led to his cancer diagnosis." src="images/plate2-3.jpg" style="height:98vh;width:auto;"/>
</figure>
<figure class="cover">
<img alt="At the top of the page, the infamous picture that plunged the Sentebale charity into crisis. Pictured here is Meghan presenting the trophy to Harry after his team won the Royal Salute Polo Challenge in Wellington, Florida. Photographed after she was pushed aside by Meghan, Sophie Chandauka, the charity’s chairwoman, refused Harry’s request to defend Meghan and successfully contested the Prince’s authority. At the bottom of the page, an image of Harry and Meghan around a table, toasting with champagne, shot for her Netflix show. The caption reads: Constantly seeking to rebrand herself, Meghan’s Netflix series With Love, Meghan in March 2025 attracted damning criticism. Cynics particularly identified Meghan’s lacklustre ‘friends’ on the shows. From left: Heather Dorak, Harry, Genevieve Hillis, Julian Zafjen, Kelly Zafjen and Meghan." src="images/plate2-4.jpg" style="height:98vh;width:auto;"/>
</figure>
<figure class="cover">
<img alt="At the top of the page, an image of Meghan and Harry posing with Jamaica’s stridently anti-royalist prime minister Andrew Holness before the premiere of Bob Marley: One Love in Kingston in 2024. At the bottom of the page, an image of Harry and Meghan smiling with a group of school children behind them, with dancers in the foreground. The caption reads: The Sussexes’ ‘state’ visit to Nigeria in May 2024 resembled a genuine royal tour – here visiting the Lights Academy in Abuja – and simultaneously promoted Meghan’s clothes’ labels." src="images/plate2-5.jpg" style="height:98vh;width:auto;"/>
</figure>
<figure class="cover">
<img alt="At the top of the page, an image of Harry and Meghan, holding hands, walking with a group in front of a plane. The caption reads: Controversy dogged the Sussexes’ Nigerian tour, not least flying as a guest of Allen Onyema (pictured behind Meghan), a local businessman facing allegations of fraud in America. At the bottom of the page, an image of Harry and Meghan posing for a photo with a group of women. The caption reads: Seizing on a second opportunity to pose as royals-on-tour, Harry and Meghan were guests of Colombia’s key cabinet minister, Aurora Vergara in August 2024. Vergara’s expectation of a generous financial bequest from the Sussexes after their visit to the Afro Women and Power Forum in Cali was dashed." src="images/plate2-6.jpg" style="height:98vh;width:auto;"/>
</figure>
<figure class="cover">
<img alt="At the top of the page, an image of Meghan in front of a small crowd. The caption reads: Always anxious to improve her ‘brand’ and reputation as a ‘fashion influencer’, Meghan Markle’s surprise appearance at Balenciaga’s show in Paris in October 2025 scored a huge hit but in the aftermath the benefits were imperceptible. At the bottom of the page, an image of the Sussexes posing with the tennis champion Serena Williams at the Baby2Baby Gala in West Hollywood in November 2025." src="images/plate2-7.jpg" style="height:98vh;width:auto;"/>
</figure>
<figure class="cover">
<img alt="At the top of the page, an image of the Sussexes at the premiere of Cookie Queens with the director Alysa Nahmias at Sundance in January 2026. Disagreements about whether the viewing theatre was full or half-empty (empty seats were hastily filled) were followed by reports that the praised film failed to attract a distributor. At the bottom of the page, an image of Harry leaving court after testifying against Associate Newspapers in January 2026, Harry hoped – along with fellow claimants Elton John and Liz Hurley – that the Daily Mail, accused of unlawful information gathering, would be mercilessly humbled at the end of a £38 million trial. During the trial, a Mail journalist called Harry’s legal team a ‘mob of shysters, spivs and useful idiots’." src="images/plate2-8.jpg" style="height:98vh;width:auto;"/>
</figure>
</section>
